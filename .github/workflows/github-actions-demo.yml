name: CMake on a single platform

on:
  push:
    branches: [$default-branch]
  pull_request:
    branches: [$default-branch]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Provide Python to the VM
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Generate the build system (reads CMakeLists.txt)
      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      # Runs: pip install -r requirements.txt
      - name: Install dependencies
        run: cmake --build ${{github.workspace}}/build --target install_deps

      # Runs: python3 -m src.astralog_mock --rules ... --input ... --output ...
      - name: Run astralog_mock
        run: cmake --build ${{github.workspace}}/build --target run

      # Runs: python3 -m pytest -v  (via ctest)
      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure
